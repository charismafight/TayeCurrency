name: Deploy Taye.Web to zhiren linux2 server

on:
  push:
    branches: [main, master]
    paths:
      - "taye-web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "taye-web/package-lock.json"

      - name: Install dependencies
        run: |
          cd taye-web
          npm install

      - name: Build project
        run: |
          cd taye-web
          npm run build

      - name: Package dist
        run: |
          cd taye-web/dist
          tar -czf ../dist.tar.gz .

      # ✅ 用 scp-action 替换 ssh-deploy
      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "taye-web/dist.tar.gz"
          target: "/tmp/taye-deploy/"
          rm: false
          strip_components: 0

      - name: Extract and copy to wwwroot
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd /tmp/taye-deploy/taye-web
            tar -xzf dist.tar.gz
            sudo cp -r ./* /var/www/taye/wwwroot/
            sudo rm -rf /tmp/taye-deploy
            sudo systemctl restart taye.service
            echo "✅ 部署完成！"
