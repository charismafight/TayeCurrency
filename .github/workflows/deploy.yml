name: Deploy Taye.Web to API wwwroot

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "taye-web/package-lock.json"

      - name: Install dependencies
        run: |
          cd taye-web
          npm install

      - name: Build project
        run: |
          cd taye-web
          npm run build

      - name: Package dist
        run: |
          cd taye-web/dist
          tar -czf ../dist.tar.gz .

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          PORT: ${{ secrets.DEPLOY_PORT }}
          SOURCE: "taye-web/dist.tar.gz"
          TARGET: "/tmp/taye-deploy/"
          ARGS: "-avz --delete"

      - name: Extract and copy to wwwroot
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd /tmp/taye-deploy
            tar -xzf dist.tar.gz
            sudo cp -r /tmp/taye-deploy/* /var/www/taye/wwwroot/
            sudo rm -rf /tmp/taye-deploy
            sudo systemctl restart taye.service
            echo "✅ 部署完成！"
